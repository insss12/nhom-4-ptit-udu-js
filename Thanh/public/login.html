<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Đăng nhập</title>
</head>
<body>
<div class="auth-shell">
    <div class="brand-panel">
        <div class="brand-mark">NORRA</div>
        <div class="brand-quote">Chào mừng trở lại!</div>
    </div>
    <div class="form-panel">
        <div class="form-card">
            <h1>Đăng nhập</h1>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email">
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn-primary" onclick="login()">Đăng nhập</button>
            <div class="form-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></div>
        </div>
    </div>
</div>
<script>
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });
    const data = await res.json();
    alert(data.message);
    if(res.ok) window.location.href = "account.html";
}
</script>
</body>
</html>
