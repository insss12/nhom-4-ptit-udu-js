<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Đăng ký</title>
</head>
<body>
<div class="auth-shell">
    <div class="brand-panel">
        <div class="brand-mark">NORRA</div>
        <div class="brand-quote">Chào mừng bạn đến với Norra.</div>
    </div>
    <div class="form-panel">
        <div class="form-card">
            <h1>Đăng ký</h1>
            <div class="field">
                <label>Họ tên</label>
                <input type="text" id="fullName" placeholder="Nhập họ tên">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="Nhập email">
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn-primary" onclick="register()">Đăng ký</button>
            <div class="form-footer">Đã có tài khoản? <a href="login.html">Đăng nhập</a></div>
        </div>
    </div>
</div>
<script>
async function register() {
    const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            fullName: document.getElementById("fullName").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });
    const data = await res.json();
    alert(data.message);
    if(res.ok) window.location.href = "login.html";
}
</script>
</body>
</html>
